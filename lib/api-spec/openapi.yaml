openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Instinct Scalper API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Bot control operations
  - name: trades
    description: Trade history
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/config:
    get:
      operationId: getBotConfig
      tags: [bot]
      summary: Get bot configuration
      responses:
        "200":
          description: Current bot config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfig"
    patch:
      operationId: updateBotConfig
      tags: [bot]
      summary: Update bot configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotConfigUpdate"
      responses:
        "200":
          description: Updated bot config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfig"

  /bot/start:
    post:
      operationId: startBot
      tags: [bot]
      summary: Start the bot
      responses:
        "200":
          description: Bot started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/stop:
    post:
      operationId: stopBot
      tags: [bot]
      summary: Stop the bot
      responses:
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"


  /bot/momentum/status:
    get:
      operationId: getMomentumBotStatus
      tags: [bot]
      summary: Get Momentum Bot status
      responses:
        "200":
          description: Momentum bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MomentumBotStatus"

  /bot/momentum/auto:
    post:
      operationId: setMomentumBotAuto
      tags: [bot]
      summary: Set Momentum Bot auto mode / risk config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MomentumBotAutoBody"
      responses:
        "200":
          description: Updated Momentum bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MomentumBotStatus"

  /bot/momentum/reset-sim:
    post:
      operationId: resetMomentumSim
      tags: [bot]
      summary: Reset Momentum simulator stats
      responses:
        "200":
          description: Momentum bot status after reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MomentumBotStatus"

  /bot/momentum/reset-all:
    post:
      operationId: resetMomentumAll
      tags: [bot]
      summary: Reset all Momentum stats
      responses:
        "200":
          description: Momentum bot status after full reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MomentumBotStatus"

  /bot/momentum/paper-stats:
    get:
      operationId: getMomentumPaperStats
      tags: [bot]
      summary: Get Momentum paper-trade analytics
      responses:
        "200":
          description: Paper-trading stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperStats"

  /trades:
    get:
      operationId: listTrades
      tags: [trades]
      summary: List all trades
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of trades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeList"

  /trades/stats:
    get:
      operationId: getTradeStats
      tags: [trades]
      summary: Get trade statistics
      responses:
        "200":
          description: Trade stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeStats"

  /logs:
    get:
      operationId: getBotLogs
      tags: [bot]
      summary: Get recent bot logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Bot logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogList"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    BotConfig:
      type: object
      properties:
        maxEntryPriceCents:
          type: integer
          description: Only enter if ask price per contract is at or below this (cents)
        minNetProfitCents:
          type: integer
          description: Minimum net profit to exit (cents, after fees)
        maxNetProfitCents:
          type: integer
          description: Maximum net profit target (cents, after fees)
        minMinutesRemaining:
          type: integer
          description: Skip market if this many minutes or fewer remain
        feeRate:
          type: number
          description: Kalshi fee rate on profit (e.g. 0.07 = 7%)
        pollIntervalSecs:
          type: integer
          description: How often to scan markets (seconds)
        marketCategories:
          type: array
          items:
            type: string
          description: Which market categories to trade - "crypto", "sports", or "all"
        cryptoCoins:
          type: array
          items:
            type: string
          description: Which crypto coins to trade e.g. ["BTC","ETH","SOL","DOGE"]
        maxOpenPositions:
          type: integer
          description: Maximum number of concurrent open trades
        balanceFloorCents:
          type: integer
          description: Auto-stop if account balance drops below this (cents, 0 = disabled)
        dailyProfitTargetCents:
          type: integer
          description: Auto-stop when daily profit reaches this (cents, 0 = disabled)
        dailyLossLimitCents:
          type: integer
          description: Auto-stop when daily loss reaches this (cents, 0 = disabled)
        exitWindowMins:
          type: integer
          description: Place limit sell order when this many minutes remain (e.g. 7)
      required:
        - maxEntryPriceCents
        - minNetProfitCents
        - maxNetProfitCents
        - minMinutesRemaining
        - feeRate
        - pollIntervalSecs
        - marketCategories
        - cryptoCoins
        - maxOpenPositions
        - balanceFloorCents
        - dailyProfitTargetCents
        - dailyLossLimitCents
        - exitWindowMins

    BotConfigUpdate:
      type: object
      properties:
        maxEntryPriceCents:
          type: integer
        minNetProfitCents:
          type: integer
        maxNetProfitCents:
          type: integer
        minMinutesRemaining:
          type: integer
        feeRate:
          type: number
        pollIntervalSecs:
          type: integer
        marketCategories:
          type: array
          items:
            type: string
        cryptoCoins:
          type: array
          items:
            type: string
        maxOpenPositions:
          type: integer
        balanceFloorCents:
          type: integer
        dailyProfitTargetCents:
          type: integer
        dailyLossLimitCents:
          type: integer
        exitWindowMins:
          type: integer

    BotStatus:
      type: object
      properties:
        running:
          type: boolean
        startedAt:
          type: ["string", "null"]
        marketsScanned:
          type: integer
        tradesAttempted:
          type: integer
        tradesSucceeded:
          type: integer
        totalPnlCents:
          type: integer
        dailyPnlCents:
          type: integer
        openPositionCount:
          type: integer
        balanceCents:
          type: integer
        stoppedReason:
          type: ["string", "null"]
      required:
        - running
        - startedAt
        - marketsScanned
        - tradesAttempted
        - tradesSucceeded
        - totalPnlCents
        - dailyPnlCents
        - openPositionCount
        - balanceCents
        - stoppedReason

    MomentumBotAutoBody:
      type: object
      properties:
        enabled:
          type: boolean
        balanceFloorCents:
          type: integer
          minimum: 0
        maxSessionLossCents:
          type: integer
          minimum: 0
        consecutiveLossLimit:
          type: integer
          minimum: 0
        betCostCents:
          type: integer
          minimum: 1
        simulatorMode:
          type: boolean
        priceMin:
          type: integer
          minimum: 1
          maximum: 99
        priceMax:
          type: integer
          minimum: 1
          maximum: 99
        tpCents:
          type: integer
          minimum: 1
          maximum: 99
        slCents:
          type: integer
          minimum: 1
          maximum: 99
        staleMs:
          type: integer
          minimum: 10000
          maximum: 300000
        tpAbsoluteCents:
          type: integer
          minimum: 0
          maximum: 99
        sessionProfitTargetCents:
          type: integer
          minimum: 0
        allowedCoins:
          type: array
          items:
            type: string
      required:
        - enabled

    MomentumBotHealthScore:
      type: object
      properties:
        total:
          type: number
        label:
          type: string
          enum: [Healthy, Fragile, Broken, Pending]
        tradesInBuffer:
          type: number
        winRate:
          type: number
        netEV:
          type: number
        avgWin:
          type: number
        avgLoss:
          type: number
        staleRate:
          type: number
        evScore:
          type: number
        stabilityScore:
          type: number
        ratioScore:
          type: number
        staleScore:
          type: number
        execScore:
          type: number
      required:
        - total
        - label
        - tradesInBuffer
        - winRate
        - netEV
        - avgWin
        - avgLoss
        - staleRate
        - evScore
        - stabilityScore
        - ratioScore
        - staleScore
        - execScore

    MomentumBotStatus:
      type: object
      properties:
        enabled:
          type: boolean
        autoMode:
          type: boolean
        status:
          type: string
          enum: [DISABLED, WAITING_FOR_SETUP, IN_TRADE, PAUSED]
        openTradeCount:
          type: integer
        lastDecision:
          type: ["string", "null"]
        lastDecisionAt:
          type: ["string", "null"]
        totalWins:
          type: integer
        totalLosses:
          type: integer
        totalPnlCents:
          type: integer
        sessionPnlCents:
          type: integer
        sessionWins:
          type: integer
        sessionLosses:
          type: integer
        consecutiveLosses:
          type: integer
        pausedUntilMs:
          type: ["integer", "null"]
        pauseReason:
          type: ["string", "null"]
        stopReason:
          type: ["string", "null"]
        balanceFloorCents:
          type: integer
        maxSessionLossCents:
          type: integer
        consecutiveLossLimit:
          type: integer
        betCostCents:
          type: integer
        simulatorMode:
          type: boolean
        simPnlCents:
          type: integer
        simWins:
          type: integer
        simLosses:
          type: integer
        simOpenTradeCount:
          type: integer
        priceMin:
          type: integer
        priceMax:
          type: integer
        tpCents:
          type: integer
        slCents:
          type: integer
        staleMs:
          type: integer
        tpAbsoluteCents:
          type: integer
        sessionProfitTargetCents:
          type: integer
        startingBalanceCents:
          type: ["integer", "null"]
        allTimeWins:
          type: integer
        allTimeLosses:
          type: integer
        allTimePnlCents:
          type: integer
        healthScore:
          anyOf:
            - $ref: "#/components/schemas/MomentumBotHealthScore"
            - type: "null"
        allowedCoins:
          type: array
          items:
            type: string
      required:
        - enabled
        - autoMode
        - status
        - openTradeCount
        - lastDecision
        - lastDecisionAt
        - totalWins
        - totalLosses
        - totalPnlCents
        - sessionPnlCents
        - sessionWins
        - sessionLosses
        - consecutiveLosses
        - pausedUntilMs
        - pauseReason
        - stopReason
        - balanceFloorCents
        - maxSessionLossCents
        - consecutiveLossLimit
        - betCostCents
        - simulatorMode
        - simPnlCents
        - simWins
        - simLosses
        - simOpenTradeCount
        - priceMin
        - priceMax
        - tpCents
        - slCents
        - staleMs
        - tpAbsoluteCents
        - sessionProfitTargetCents
        - startingBalanceCents
        - allTimeWins
        - allTimeLosses
        - allTimePnlCents
        - healthScore
        - allowedCoins

    PaperTradeRecord:
      type: object
      properties:
        id:
          type: integer
        coin:
          type: string
        side:
          type: string
        entryPrice:
          type: integer
        exitPrice:
          type: integer
        pnlCents:
          type: integer
        exitReason:
          type: string
        closedAt:
          type: string
      required:
        - id
        - coin
        - side
        - entryPrice
        - exitPrice
        - pnlCents
        - exitReason
        - closedAt

    TimeOfDayBucket:
      type: object
      properties:
        label:
          type: string
        wins:
          type: integer
        losses:
          type: integer
        pnlCents:
          type: integer
      required:
        - label
        - wins
        - losses
        - pnlCents

    PaperStats:
      type: object
      properties:
        totalTrades:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        winRatePct:
          type: number
        totalPnlCents:
          type: integer
        evPerTradeCents:
          type: number
        maxDrawdownCents:
          type: integer
        timeOfDay:
          type: array
          items:
            $ref: "#/components/schemas/TimeOfDayBucket"
        recentTrades:
          type: array
          items:
            $ref: "#/components/schemas/PaperTradeRecord"
      required:
        - totalTrades
        - wins
        - losses
        - winRatePct
        - totalPnlCents
        - evPerTradeCents
        - maxDrawdownCents
        - timeOfDay
        - recentTrades

    Trade:
      type: object
      properties:
        id:
          type: integer
        marketId:
          type: string
        marketTitle:
          type: string
        side:
          type: string
        buyPriceCents:
          type: integer
        sellPriceCents:
          type: ["integer", "null"]
        contractCount:
          type: number
        contractCountFp:
          type: ["string", "null"]
        feeCents:
          type: integer
        pnlCents:
          type: ["integer", "null"]
        status:
          type: string
        createdAt:
          type: string
        closedAt:
          type: ["string", "null"]
        minutesRemaining:
          type: ["number", "null"]
      required:
        - id
        - marketId
        - marketTitle
        - side
        - buyPriceCents
        - sellPriceCents
        - contractCount
        - contractCountFp
        - feeCents
        - pnlCents
        - status
        - createdAt
        - closedAt
        - minutesRemaining

    TradeList:
      type: object
      properties:
        trades:
          type: array
          items:
            $ref: "#/components/schemas/Trade"
        total:
          type: integer
      required:
        - trades
        - total

    TradeStats:
      type: object
      properties:
        totalTrades:
          type: integer
        winningTrades:
          type: integer
        losingTrades:
          type: integer
        openTrades:
          type: integer
        totalPnlCents:
          type: integer
        totalWinCents:
          type: integer
        totalLossCents:
          type: integer
        todayPnlCents:
          type: integer
        winRate:
          type: number
        avgPnlCents:
          type: number
      required:
        - totalTrades
        - winningTrades
        - losingTrades
        - openTrades
        - totalPnlCents
        - totalWinCents
        - totalLossCents
        - todayPnlCents
        - winRate
        - avgPnlCents

    LogEntry:
      type: object
      properties:
        id:
          type: integer
        level:
          type: string
        message:
          type: string
        data:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - level
        - message
        - data
        - createdAt

    LogList:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
      required:
        - logs
